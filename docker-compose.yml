version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: fitness_db
    environment:
      POSTGRES_USER: fitness_user
      POSTGRES_PASSWORD: fitness_password
      POSTGRES_DB: fitness_db
    ports:
      - "5433:5432"

  core-java:
    build:
      context: .
    container_name: fitness_java_core
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/fitness_db
      - SPRING_DATASOURCE_USERNAME=fitness_user
      - SPRING_DATASOURCE_PASSWORD=fitness_password